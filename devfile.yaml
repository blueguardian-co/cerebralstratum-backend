schemaVersion: 2.1.0
metadata:
  name: python-hello-world
  namespace: che-kube-admin-devspaces-6skydy
projects:
  - name: cs-backend
    git:
      remotes:
        origin: git@github.com:blueguardian-co/cerebralstratum-backend.git
      checkoutFrom:
        revision: main
components:
  - attributes:
      che-code.eclipse.org/contribute-cpuLimit: true
      che-code.eclipse.org/contribute-cpuRequest: true
      che-code.eclipse.org/contribute-endpoint/che-code: 3100
      che-code.eclipse.org/contribute-endpoint/code-redirect-1: 13131
      che-code.eclipse.org/contribute-endpoint/code-redirect-2: 13132
      che-code.eclipse.org/contribute-endpoint/code-redirect-3: 13133
      che-code.eclipse.org/contribute-entry-point: true
      che-code.eclipse.org/contribute-memoryLimit: true
      che-code.eclipse.org/contribute-memoryRequest: true
      che-code.eclipse.org/contribute-volume-mount/checode: /checode
      che-code.eclipse.org/contributed-container: python
      che-code.eclipse.org/original-memoryLimit: 2G
    container:
      command:
        - /checode/entrypoint-volume.sh
      cpuLimit: 500m
      cpuRequest: 30m
      endpoints:
        - attributes:
            contributed-by: che-code.eclipse.org
            cookiesAuthEnabled: true
            discoverable: false
            type: main
            urlRewriteSupported: true
          exposure: public
          name: che-code
          path: '?tkn=eclipse-che'
          protocol: https
          secure: false
          targetPort: 3100
        - attributes:
            contributed-by: che-code.eclipse.org
            discoverable: false
            urlRewriteSupported: true
          exposure: public
          name: code-redirect-1
          protocol: http
          targetPort: 13131
        - attributes:
            contributed-by: che-code.eclipse.org
            discoverable: false
            urlRewriteSupported: true
          exposure: public
          name: code-redirect-2
          protocol: http
          targetPort: 13132
        - attributes:
            contributed-by: che-code.eclipse.org
            discoverable: false
            urlRewriteSupported: true
          exposure: public
          name: code-redirect-3
          protocol: http
          targetPort: 13133
      env:
        - name: CHE_DASHBOARD_URL
          value: 'https://devspaces.apps.k8s.idm.hussdogg.com'
        - name: CHE_PLUGIN_REGISTRY_URL
          value: 'https://devspaces.apps.k8s.idm.hussdogg.com/plugin-registry/v3'
        - name: CHE_PLUGIN_REGISTRY_INTERNAL_URL
          value: 'http://plugin-registry.openshift-operators.svc:8080/v3'
        - name: OPENVSX_REGISTRY_URL
          value: 'https://open-vsx.org'
      image: 'registry.redhat.io/devspaces/udi-rhel8:latest'
      memoryLimit: 3.07G
      memoryRequest: 256Mi
      endpoints:
        - exposure: public
          name: csapi
          protocol: http
          targetPort: 6443
      mountSources: true
      sourceMapping: /projects
      volumeMounts:
        - name: venv
          path: /home/user/venv
        - name: checode
          path: /checode
    name: python
  - endpoints:
      - exposure: public
        name: cswa
        protocol: http
        targetPort: 3000
    image: quay.io/ahussey-redhat/cs-wa:stable
    name: cswa
  - name: venv
    volume:
      size: 1G
commands:
  - exec:
      commandLine: python -m venv venv && source ./venv/bin/activate && cs-api
      component: python
      group:
        kind: run
      label: Run the application
      workingDir: '${PROJECTS_ROOT}'
    id: run
