quarkus:
  application:
    name: cerebral-stratum-device-simulator
  devservices:
    enabled: true
  live-reload:
    instrumentation: true

mp:
  messaging:
    outgoing:
      /device/location:
        topic: location
        host: ${MQTT_HOST:localhost}
        port: 1883
        connector: smallrye-mqtt
      /device/status:
        topic: status
        host: ${MQTT_HOST:localhost}
        port: 1883
        connector: smallrye-mqtt

'%dev':
  quarkus:
    otel:
      resource:
        attributes: "service.instance.id=${HOSTNAME:unknown-dev},service.name=cerebral-stratum-device-simulator,deployment.environment.name=development"
      traces:
        enabled: true
        eusp:
          enabled: true
      logs:
        enabled: true
      metrics:
        enabled: true
      exporter:
        otlp:
          endpoint: https://otlp-gateway-prod-au-southeast-1.grafana.net/otlp
          protocol: http/protobuf
          headers: ${QUARKUS_OTEL_EXPORTER_OTLP_HEADERS}

'%test':
  quarkus:
    otel:
      traces:
        enabled: false
      metrics:
        enabled: false
      logs:
        enabled: false

'%prod':
  quarkus:
    otel:
      resource:
        attributes: "service.instance.id=${HOSTNAME:unknown-prod},service.name=cerebral-stratum-device-simulator,service.namespace=cerebral-stratum,deployment.environment.name=production"
      traces:
        enabled: true
        eusp:
          enabled: false
      metrics:
        enabled: true
      logs:
        enabled: true
    http:
      host: 0.0.0.0
