schemaVersion: 2.2.0
metadata:
  name: cerebral-stratum-backend
components:
  - attributes:
      controller.devfile.io/merge-contribution: true
    container:
      env:
        - name: CHE_DASHBOARD_URL
          value: https://devspaces.apps.sandbox-m4.g2pi.p1.openshiftapps.com
        - name: CHE_PLUGIN_REGISTRY_URL
          value: https://devspaces.apps.sandbox-m4.g2pi.p1.openshiftapps.com/plugin-registry/v3
        - name: CHE_PLUGIN_REGISTRY_INTERNAL_URL
          value: http://plugin-registry.crw.svc:8080/v3
        - name: CLUSTER_CONSOLE_URL
          value: https://console-openshift-console.apps.sandbox-m4.g2pi.p1.openshiftapps.com
        - name: CLUSTER_CONSOLE_TITLE
          value: OpenShift console
        - name: OPENVSX_REGISTRY_URL
          value: https://open-vsx.org
      image: registry.redhat.io/devspaces/udi-rhel8:latest
      sourceMapping: /projects
    name: universal-developer-image
  - container:
      cpuLimit: "2.0"
      cpuRequest: 200m
      memoryLimit: 4Gi
      memoryRequest: 256Mi
      command:
        - sleep
        - infinity
      env:
        - name: DEV_MODE
          value: 'true'
      endpoints:
        - exposure: public
          name: csapi
          protocol: http
          targetPort: 6443
      mountSources: true
      sourceMapping: /projects
      image: registry.access.redhat.com/ubi9/openjdk-17-runtime:latest
    name: java
commands:
  - id: compile-and-run
    exec:
      component: java
      commandLine: './mvnw compile quarkus:dev'
      label: compile and run
      workingDir: '${PROJECT_SOURCE}'
